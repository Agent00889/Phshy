<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phishing URL Detector</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0c10;
    --surface: #11141a;
    --surface2: #181c24;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #e8eaf0;
    --muted: #6b7280;
    --accent: #00e5a0;
    --accent2: #00b37d;
    --danger: #ff4d6d;
    --warn: #ffb830;
    --info: #4d9fff;
    --safe: #00e5a0;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 0;
  }

  .hero {
    background: linear-gradient(160deg, #0d1117 0%, #0a0c10 50%, #080d12 100%);
    border-bottom: 1px solid var(--border);
    padding: 3rem 2rem 2.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: -120px; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 300px;
    background: radial-gradient(ellipse, rgba(0,229,160,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  .shield-icon {
    width: 52px; height: 52px;
    margin: 0 auto 1.2rem;
    background: linear-gradient(135deg, rgba(0,229,160,0.15), rgba(0,179,125,0.05));
    border: 1px solid rgba(0,229,160,0.3);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
  }

  h1 {
    font-family: var(--mono);
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: #fff;
    margin-bottom: 0.4rem;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    font-size: 0.85rem;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    font-weight: 400;
  }

  .container {
    max-width: 780px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  .input-wrapper {
    display: flex;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 8px 8px 8px 16px;
    transition: border-color 0.2s;
    margin-bottom: 2rem;
  }

  .input-wrapper:focus-within {
    border-color: rgba(0,229,160,0.5);
    box-shadow: 0 0 0 3px rgba(0,229,160,0.06);
  }

  .url-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-family: var(--mono);
    font-size: 0.82rem;
    color: var(--text);
    padding: 6px 0;
    letter-spacing: 0.01em;
  }

  .url-input::placeholder { color: var(--muted); }

  .scan-btn {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-family: var(--mono);
    font-size: 0.75rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .scan-btn:hover { background: #00ff9f; transform: translateY(-1px); }
  .scan-btn:active { transform: translateY(0); }
  .scan-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 1.5rem;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .verdict-banner {
    padding: 1.4rem 1.6rem;
    display: flex;
    align-items: center;
    gap: 1.2rem;
    border-bottom: 1px solid var(--border);
  }

  .verdict-badge {
    font-family: var(--mono);
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 6px 14px;
    border-radius: 6px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .v-safe    { background: rgba(0,229,160,0.12); color: var(--safe); border: 1px solid rgba(0,229,160,0.25); }
  .v-low     { background: rgba(77,159,255,0.12); color: var(--info); border: 1px solid rgba(77,159,255,0.25); }
  .v-medium  { background: rgba(255,184,48,0.12); color: var(--warn); border: 1px solid rgba(255,184,48,0.25); }
  .v-high    { background: rgba(255,77,109,0.15); color: var(--danger); border: 1px solid rgba(255,77,109,0.25); }
  .v-critical{ background: rgba(255,77,109,0.2); color: var(--danger); border: 1px solid rgba(255,77,109,0.4); }

  .verdict-info { flex: 1; min-width: 0; }
  .verdict-url {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-bottom: 4px;
  }

  .verdict-score {
    font-size: 0.8rem;
    color: var(--muted);
  }

  .verdict-score strong { color: var(--text); }

  .confidence-row {
    padding: 1rem 1.6rem;
    border-bottom: 1px solid var(--border);
  }

  .conf-label {
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
  }

  .conf-label span { color: var(--text); font-family: var(--mono); }

  .conf-bar-bg {
    height: 6px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
  }

  .conf-bar-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .findings-section { padding: 1.2rem 1.6rem; }

  .findings-title {
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 12px;
  }

  .finding-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 8px;
    margin-bottom: 6px;
    border: 1px solid transparent;
    font-size: 0.82rem;
  }

  .finding-item.high   { background: rgba(255,77,109,0.05); border-color: rgba(255,77,109,0.15); }
  .finding-item.medium { background: rgba(255,184,48,0.05); border-color: rgba(255,184,48,0.12); }
  .finding-item.low    { background: rgba(77,159,255,0.04); border-color: rgba(77,159,255,0.1); }
  .finding-item.safe   { background: rgba(0,229,160,0.04); border-color: rgba(0,229,160,0.12); }

  .finding-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    margin-top: 5px;
    flex-shrink: 0;
  }

  .high   .finding-dot { background: var(--danger); }
  .medium .finding-dot { background: var(--warn); }
  .low    .finding-dot { background: var(--info); }
  .safe   .finding-dot { background: var(--safe); }

  .finding-cat {
    font-family: var(--mono);
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    flex-shrink: 0;
    min-width: 110px;
  }

  .high   .finding-cat { color: var(--danger); }
  .medium .finding-cat { color: var(--warn); }
  .low    .finding-cat { color: var(--info); }
  .safe   .finding-cat { color: var(--safe); }

  .finding-desc { color: var(--text); flex: 1; line-height: 1.4; }

  .finding-score {
    font-family: var(--mono);
    font-size: 0.68rem;
    color: var(--muted);
    flex-shrink: 0;
  }

  .examples-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }

  .example-chip {
    font-family: var(--mono);
    font-size: 0.68rem;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 5px 10px;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.15s;
    letter-spacing: 0.01em;
  }

  .example-chip:hover { border-color: var(--accent2); color: var(--accent); }

  .legend {
    display: flex;
    gap: 16px;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.72rem;
    color: var(--muted);
  }

  .legend-dot {
    width: 7px; height: 7px; border-radius: 50%;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 1.5rem;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    text-align: center;
  }

  .stat-num {
    font-family: var(--mono);
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-label {
    font-size: 0.68rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
  }

  .history-section { margin-top: 2rem; }

  .history-title {
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
  }

  .history-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .history-item:hover { border-color: var(--border2); }

  .history-url {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--muted);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(0,229,160,0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--muted);
  }

  .empty-icon { font-size: 2.5rem; margin-bottom: 1rem; opacity: 0.4; }
  .empty-text { font-size: 0.85rem; line-height: 1.6; }

  @media (max-width: 500px) {
    h1 { font-size: 1.2rem; }
    .stats-grid { grid-template-columns: repeat(3, 1fr); }
    .finding-cat { min-width: 80px; }
  }
</style>
</head>
<body>

<div class="hero">
  <div class="shield-icon">🛡</div>
  <h1>Phishing <span>Detector</span></h1>
  <p class="subtitle">Real-time URL threat analysis · 20 detection checks</p>
</div>

<div class="container">

  <div class="input-wrapper">
    <input type="text" class="url-input" id="urlInput" placeholder="https://example.com or paste any suspicious URL..." />
    <button class="scan-btn" id="scanBtn" onclick="doScan()">SCAN</button>
  </div>

  <div class="examples-row" id="examplesRow">
    <span class="example-chip" onclick="loadExample('https://google.com')">google.com</span>
    <span class="example-chip" onclick="loadExample('http://paypal-secure-login.tk/verify?token=abc123')">paypal phishing</span>
    <span class="example-chip" onclick="loadExample('http://192.168.1.1/login')">IP address</span>
    <span class="example-chip" onclick="loadExample('https://bit.ly/3xFakeURL')">URL shortener</span>
    <span class="example-chip" onclick="loadExample('http://secure-apple-id-verify.login.xyz/account/update?otp=1234')">apple spoofing</span>
    <span class="example-chip" onclick="loadExample('https://github.com/features')">github.com</span>
  </div>

  <div id="resultArea"></div>

  <div id="historySection" class="history-section" style="display:none">
    <p class="history-title">Recent scans</p>
    <div id="historyList"></div>
  </div>

</div>

<script>
const LEGITIMATE_DOMAINS = new Set(["google.com","facebook.com","amazon.com","apple.com","microsoft.com","paypal.com","ebay.com","twitter.com","instagram.com","linkedin.com","youtube.com","netflix.com","github.com","stackoverflow.com","wikipedia.org","reddit.com","dropbox.com","adobe.com","salesforce.com","zoom.us","slack.com","shopify.com","stripe.com","cloudflare.com","wordpress.com","squarespace.com","wix.com","godaddy.com","namecheap.com","yahoo.com","outlook.com","live.com","hotmail.com","protonmail.com","sbi.co.in","hdfcbank.com","icicibank.com","axisbank.com","kotak.com","irctc.co.in","paytm.com","phonepe.com","gpay.com","bhimupi.org.in"]);

const SUSPICIOUS_KEYWORDS = ["login","signin","sign-in","account","verify","verification","update","secure","security","bank","banking","payment","pay","confirm","wallet","password","credential","authenticate","validation","support","help","service","customer","suspend","suspended","alert","warning","urgent","immediate","limited","expire","expired","free","prize","winner","gift","bonus","reward","claim","invoice","billing","refund","transaction","transfer","otp","pin","cvv","ssn","kyc","aadhaar","pan"];

const SUSPICIOUS_TLDS = new Set([".tk",".ml",".ga",".cf",".gq",".xyz",".top",".click",".link",".pw",".work",".party",".date",".review",".country",".kim",".men",".loan",".download",".racing",".win",".bid",".stream",".gdn",".mom"]);

const BRAND_NAMES = ["paypal","facebook","google","apple","amazon","microsoft","netflix","instagram","twitter","linkedin","ebay","dropbox","adobe","yahoo","outlook","gmail","spotify","uber","airbnb","whatsapp","telegram","signal","zoom","teams","skype","sbi","hdfc","icici","axis","paytm","phonepe","gpay","irctc","uidai","incometax","epfo","nsdl"];

const URL_SHORTENERS = new Set(["bit.ly","tinyurl.com","goo.gl","ow.ly","t.co","is.gd","buff.ly","adf.ly","short.io","rebrand.ly","cutt.ly","tiny.cc","shorturl.at","rb.gy","v.gd"]);

function shannonEntropy(s) {
  if (!s) return 0;
  const freq = {};
  for (const c of s) freq[c] = (freq[c] || 0) + 1;
  const len = s.length;
  return -Object.values(freq).reduce((sum, f) => sum + (f/len)*Math.log2(f/len), 0);
}

function extractDomainParts(hostname) {
  const parts = hostname.split(".");
  if (parts.length >= 2) {
    const domain = parts[parts.length - 2];
    const suffix = "." + parts[parts.length - 1];
    const subdomain = parts.slice(0, -2).join(".");
    const regDomain = domain + suffix;
    return { domain, suffix, subdomain, regDomain };
  }
  return { domain: hostname, suffix: "", subdomain: "", regDomain: hostname };
}

function analyzeURL(rawURL) {
  const findings = [];
  let totalScore = 0;

  function add(category, description, severity, score) {
    findings.push({ category, description, severity, score });
    totalScore += score;
  }

  let url = rawURL.trim();
  if (!url.match(/^https?:\/\//i)) url = "http://" + url;

  let parsed;
  try {
    parsed = new URL(url);
  } catch(e) {
    add("Parse Error", "Could not parse URL", "high", 30);
    return finalize(rawURL, findings, totalScore);
  }

  const hostname = parsed.hostname || "";
  const path = parsed.pathname || "";
  const query = parsed.search ? parsed.search.slice(1) : "";
  const scheme = parsed.protocol.replace(":", "").toLowerCase();
  const fullUrl = url.toLowerCase();

  if (rawURL.trim().startsWith("data:")) {
    add("Data URI", "Data URIs can embed malicious HTML/JS", "high", 40);
    return finalize(rawURL, findings, totalScore);
  }

  const { domain, suffix, subdomain, regDomain } = extractDomainParts(hostname);

  if (scheme === "https") {
    add("Protocol", "Uses HTTPS (encrypted connection)", "safe", -5);
  } else {
    add("Protocol", "No HTTPS – data sent in plaintext", "medium", 15);
  }

  if (LEGITIMATE_DOMAINS.has(regDomain)) {
    add("Domain Reputation", `'${regDomain}' is a well-known legitimate domain`, "safe", -25);
  }

  if (URL_SHORTENERS.has(regDomain)) {
    add("URL Shortener", `Shortened URL via '${regDomain}' hides the real destination`, "high", 25);
  }

  if (/^\d{1,3}(\.\d{1,3}){3}$/.test(hostname)) {
    add("IP Address Host", "URL uses raw IP instead of domain name", "high", 30);
  }

  if (SUSPICIOUS_TLDS.has(suffix)) {
    add("Suspicious TLD", `'${suffix}' is a commonly abused top-level domain`, "high", 20);
  }

  for (const brand of BRAND_NAMES) {
    if (subdomain.includes(brand) && !domain.includes(brand)) {
      add("Brand Spoofing", `Brand name '${brand}' in subdomain but not the real domain`, "high", 35);
      break;
    }
  }

  for (const brand of BRAND_NAMES) {
    if (domain.includes(brand) && !LEGITIMATE_DOMAINS.has(regDomain)) {
      add("Brand in Domain", `Brand name '${brand}' in domain, but not the official site`, "high", 25);
      break;
    }
  }

  const hyphenCount = (domain.match(/-/g) || []).length;
  if (hyphenCount >= 3) add("Excessive Hyphens", `${hyphenCount} hyphens in domain (e.g. secure-paypal-login.com)`, "high", 20);
  else if (hyphenCount === 2) add("Multiple Hyphens", `${hyphenCount} hyphens in domain`, "medium", 10);
  else if (hyphenCount === 1) add("Hyphen in Domain", "One hyphen in domain", "low", 3);

  const foundKw = SUSPICIOUS_KEYWORDS.filter(kw => fullUrl.includes(kw));
  if (foundKw.length >= 3) {
    add("Many Phishing Keywords", `Found ${foundKw.length} suspicious keywords: ${foundKw.slice(0,5).join(", ")}`, "high", 25);
  } else if (foundKw.length >= 1) {
    add("Phishing Keywords", `Suspicious keywords: ${foundKw.join(", ")}`, "medium", 10);
  }

  const urlLen = url.length;
  if (urlLen > 100) add("Very Long URL", `URL is ${urlLen} characters – phishing URLs often hide in length`, "medium", 15);
  else if (urlLen > 75) add("Long URL", `URL is ${urlLen} characters`, "low", 5);

  const subParts = subdomain ? subdomain.split(".").filter(Boolean) : [];
  if (subParts.length >= 3) add("Deep Subdomain Nesting", `${subParts.length} subdomain levels (e.g. a.b.c.evil.com)`, "high", 20);
  else if (subParts.length === 2) add("Multiple Subdomains", `${subParts.length} subdomain levels`, "medium", 8);

  if (url.includes("@")) add("@ in URL", "@ symbol tricks browsers into ignoring the real host", "high", 30);

  if (path.includes("//")) add("Double Slash in Path", "Unusual '//' in URL path", "medium", 10);

  const hexMatches = (url.match(/%[0-9a-fA-F]{2}/g) || []).length;
  if (hexMatches > 5) add("Heavy URL Encoding", `${hexMatches} percent-encoded characters to obscure content`, "high", 20);
  else if (hexMatches > 0) add("URL Encoding", `${hexMatches} percent-encoded characters`, "low", 3);

  if (query.length > 100) add("Long Query String", `Query string is ${query.length} chars – may contain obfuscated data`, "medium", 10);

  const entropy = shannonEntropy(domain);
  if (entropy > 3.8) add("High Domain Entropy", `Domain looks randomly generated (entropy=${entropy.toFixed(2)})`, "high", 20);
  else if (entropy > 3.2) add("Moderate Domain Entropy", `Domain entropy is elevated (entropy=${entropy.toFixed(2)})`, "low", 5);

  if (domain) {
    const digitRatio = domain.split("").filter(c => /\d/.test(c)).length / domain.length;
    if (digitRatio > 0.4) add("High Digit Ratio", `${Math.round(digitRatio*100)}% of domain is digits – unusual for legit sites`, "medium", 15);
  }

  if (hostname.toLowerCase().includes("xn--")) add("Punycode Domain", "Internationalized domain – possible homoglyph attack", "high", 25);

  const suspiciousExts = [".exe",".bat",".cmd",".vbs",".js",".jar",".scr",".msi"];
  for (const ext of suspiciousExts) {
    if (path.toLowerCase().endsWith(ext)) {
      add("Suspicious File", `URL points to '${ext}' file – potential malware`, "high", 35);
      break;
    }
  }

  return finalize(rawURL, findings, totalScore);
}

function finalize(url, findings, score) {
  let verdict, riskLevel, confidence;
  if (score <= -10)       { verdict = "LIKELY SAFE";     riskLevel = "safe";     confidence = Math.min(95, 60 + Math.abs(score)); }
  else if (score <= 10)   { verdict = "LOW RISK";        riskLevel = "low";      confidence = 55; }
  else if (score <= 30)   { verdict = "SUSPICIOUS";      riskLevel = "medium";   confidence = Math.min(90, 55 + score); }
  else if (score <= 55)   { verdict = "HIGH RISK";       riskLevel = "high";     confidence = Math.min(92, 60 + Math.floor(score/2)); }
  else                    { verdict = "LIKELY PHISHING"; riskLevel = "critical"; confidence = Math.min(97, 70 + Math.floor(score/3)); }

  const sorted = [...findings].sort((a,b) => {
    const order = {high:0, medium:1, low:2, safe:3};
    return (order[a.severity]||9) - (order[b.severity]||9);
  });

  return { url, findings: sorted, totalScore: score, verdict, riskLevel, confidence };
}

const confBarColors = {
  safe: "#00e5a0", low: "#4d9fff", medium: "#ffb830", high: "#ff4d6d", critical: "#ff4d6d"
};

const verdictClass = {
  safe: "v-safe", low: "v-low", medium: "v-medium", high: "v-high", critical: "v-critical"
};

function renderResult(r) {
  const high = r.findings.filter(f=>f.severity==="high").length;
  const medium = r.findings.filter(f=>f.severity==="medium").length;
  const safe = r.findings.filter(f=>f.severity==="safe").length;

  const signedScore = r.totalScore >= 0 ? `+${r.totalScore}` : `${r.totalScore}`;

  const findingsHTML = r.findings.map(f => {
    const sign = f.score >= 0 ? `+${f.score}` : `${f.score}`;
    return `<div class="finding-item ${f.severity}">
      <div class="finding-dot"></div>
      <span class="finding-cat">${f.category}</span>
      <span class="finding-desc">${f.description}</span>
      <span class="finding-score">${sign}</span>
    </div>`;
  }).join("");

  return `
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-num" style="color:var(--danger)">${high}</div><div class="stat-label">High risk</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--warn)">${medium}</div><div class="stat-label">Medium</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--safe)">${safe}</div><div class="stat-label">Safe signals</div></div>
  </div>
  <div class="result-card">
    <div class="verdict-banner">
      <div class="verdict-badge ${verdictClass[r.riskLevel]}">${r.verdict}</div>
      <div class="verdict-info">
        <div class="verdict-url">${r.url}</div>
        <div class="verdict-score">Risk score: <strong>${signedScore}</strong> · ${r.findings.length} checks run</div>
      </div>
    </div>
    <div class="confidence-row">
      <div class="conf-label">Confidence <span>${r.confidence}%</span></div>
      <div class="conf-bar-bg">
        <div class="conf-bar-fill" style="width:${r.confidence}%;background:${confBarColors[r.riskLevel]}"></div>
      </div>
    </div>
    <div class="findings-section">
      <p class="findings-title">Detailed findings (${r.findings.length})</p>
      ${findingsHTML}
    </div>
  </div>`;
}

const scanHistory = [];

function doScan() {
  const input = document.getElementById("urlInput");
  const url = input.value.trim();
  if (!url) return;

  const btn = document.getElementById("scanBtn");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  setTimeout(() => {
    const result = analyzeURL(url);

    document.getElementById("resultArea").innerHTML = renderResult(result);
    document.getElementById("examplesRow").style.display = "none";

    scanHistory.unshift(result);
    if (scanHistory.length > 5) scanHistory.pop();
    renderHistory();

    btn.disabled = false;
    btn.textContent = "SCAN";
  }, 400);
}

function renderHistory() {
  const sec = document.getElementById("historySection");
  const list = document.getElementById("historyList");
  if (scanHistory.length === 0) { sec.style.display = "none"; return; }
  sec.style.display = "block";
  list.innerHTML = scanHistory.map(r => {
    const badge = `<span class="verdict-badge ${verdictClass[r.riskLevel]}" style="font-size:0.6rem;padding:3px 8px">${r.verdict}</span>`;
    const truncUrl = r.url.length > 60 ? r.url.slice(0,60)+"..." : r.url;
    return `<div class="history-item" onclick="reloadResult(${scanHistory.indexOf(r)})">
      ${badge}
      <span class="history-url">${truncUrl}</span>
    </div>`;
  }).join("");
}

function reloadResult(idx) {
  const r = scanHistory[idx];
  document.getElementById("resultArea").innerHTML = renderResult(r);
  document.getElementById("urlInput").value = r.url;
}

function loadExample(url) {
  document.getElementById("urlInput").value = url;
  doScan();
}

document.getElementById("urlInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter") doScan();
});
</script>
</body>
</html>
